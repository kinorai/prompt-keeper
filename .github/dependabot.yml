# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # All auto-fixable security advisories -> one consolidated PR
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
      # Routine version bumps: production deps in their own PR for review
      npm-production:
        applies-to: version-updates
        dependency-type: production
        patterns:
          - "*"
      # Routine version bumps: dev/tooling deps grouped together (low risk)
      npm-development:
        applies-to: version-updates
        dependency-type: development
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions every week
      interval: "weekly"
    groups:
      # One PR for all GitHub Actions bumps
      github-actions:
        patterns:
          - "*"
